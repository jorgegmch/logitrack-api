<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — Auditorías</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="sidebar-logo-icon">⇄</span>
                <span>LogiTrack</span>
            </div>
            <nav>
                <a href="/html/dashboard.html" class="nav-link" data-page="dashboard">📊 Dashboard</a>
                <a href="/html/productos.html" class="nav-link" data-page="productos">📦 Productos</a>
                <a href="/html/bodegas.html" class="nav-link" data-page="bodegas">🏬 Bodegas</a>
                <a href="/html/inventario.html" class="nav-link" data-page="inventario">📋 Inventario</a>
                <a href="/html/movimientos.html" class="nav-link" data-page="movimientos">🔄 Movimientos</a>
                <a href="/html/usuarios.html" class="nav-link solo-admin" data-page="usuarios">👥 Usuarios</a>
                <a href="/html/auditorias.html" class="nav-link solo-admin" data-page="auditorias">🕵️ Auditorías</a>
                <a href="/html/reportes.html" class="nav-link" data-page="reportes">📈 Reportes</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <h1 class="topbar-title">Auditorías</h1>
                <div class="topbar-actions">
                    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
                    <div class="user-badge">
                        <span id="userBadge"></span>
                        <span id="roleBadge" class="role-badge"></span>
                    </div>
                    <button id="logoutButton" class="btn btn-secondary btn-sm" type="button">Cerrar sesión</button>
                </div>
            </header>

            <main class="page-content">
                <div id="auditoriasAlert" class="alert alert-error"></div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Registro de auditoría</span>
                    </div>

                    <div class="filter-bar">
                        <div class="form-group">
                            <label for="filtroUsuario">Filtrar por usuario</label>
                            <select id="filtroUsuario">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="filtroTipoOperacion">Filtrar por tipo de operación</label>
                            <select id="filtroTipoOperacion">
                                <option value="">Todos</option>
                                <option value="INSERT">INSERT</option>
                                <option value="UPDATE">UPDATE</option>
                                <option value="DELETE">DELETE</option>
                            </select>
                        </div>
                        <button id="btnAplicarFiltroAuditoria" class="btn btn-secondary btn-sm" type="button" style="width: auto;">
                            Aplicar filtros
                        </button>
                        <button id="btnLimpiarFiltroAuditoria" class="btn btn-secondary btn-sm" type="button" style="width: auto;">
                            Ver todas
                        </button>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Fecha</th>
                                    <th>Operación</th>
                                    <th>Usuario</th>
                                    <th>Entidad</th>
                                    <th>Detalle</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAuditorias">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal: ver detalle completo -->
    <div id="modalDetalleAuditoria" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Detalle de auditoría</span>
                <button class="modal-close" id="btnCerrarModalDetalle" type="button">&times;</button>
            </div>

            <div class="form-group">
                <label>Valores anteriores</label>
                <pre id="detalleAnteriores" style="background: var(--bg-primary); padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; border: 1px solid var(--border-color);"></pre>
            </div>

            <div class="form-group">
                <label>Valores nuevos</label>
                <pre id="detalleNuevos" style="background: var(--bg-primary); padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; border: 1px solid var(--border-color);"></pre>
            </div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auditorias.js"></script>
</body>
</html>
