<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — Usuarios</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="sidebar-logo-icon">⇄</span>
                <span>LogiTrack</span>
            </div>
            <nav>
                <a href="/html/dashboard.html" class="nav-link" data-page="dashboard">📊 Dashboard</a>
                <a href="/html/productos.html" class="nav-link" data-page="productos">📦 Productos</a>
                <a href="/html/bodegas.html" class="nav-link" data-page="bodegas">🏬 Bodegas</a>
                <a href="/html/inventario.html" class="nav-link" data-page="inventario">📋 Inventario</a>
                <a href="/html/movimientos.html" class="nav-link" data-page="movimientos">🔄 Movimientos</a>
                <a href="/html/usuarios.html" class="nav-link solo-admin" data-page="usuarios">👥 Usuarios</a>
                <a href="/html/auditorias.html" class="nav-link solo-admin" data-page="auditorias">🕵️ Auditorías</a>
                <a href="/html/reportes.html" class="nav-link" data-page="reportes">📈 Reportes</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <h1 class="topbar-title">Usuarios</h1>
                <div class="topbar-actions">
                    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
                    <div class="user-badge">
                        <span id="userBadge"></span>
                        <span id="roleBadge" class="role-badge"></span>
                    </div>
                    <button id="logoutButton" class="btn btn-secondary btn-sm" type="button">Cerrar sesión</button>
                </div>
            </header>

            <main class="page-content">
                <div id="usuariosAlert" class="alert alert-error"></div>
                <div id="usuariosAlertSuccess" class="alert alert-success"></div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Gestión de usuarios</span>
                        <button id="btnAbrirRegistro" class="btn btn-primary btn-sm" type="button" style="width: auto;">
                            + Registrar usuario
                        </button>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Usuario</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaUsuarios">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal: registrar usuario -->
    <div id="modalRegistro" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Registrar nuevo usuario</span>
                <button class="modal-close" id="btnCerrarModal" type="button">&times;</button>
            </div>

            <div id="modalAlert" class="alert alert-error"></div>

            <form id="formRegistro">
                <div class="form-group">
                    <label for="nuevoUsername">Usuario</label>
                    <input type="text" id="nuevoUsername" required>
                </div>

                <div class="form-group">
                    <label for="nuevoPassword">Contraseña</label>
                    <input type="password" id="nuevoPassword" required>
                </div>

                <div class="form-group">
                    <label for="nuevoRol">Rol</label>
                    <select id="nuevoRol" required>
                        <option value="EMPLEADO">EMPLEADO</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancelarModal" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btnGuardarUsuario" class="btn btn-primary" style="width: auto;">Registrar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/usuarios.js"></script>
</body>
</html>
