<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — Iniciar sesión</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-topbar">
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
        </div>

        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <span class="auth-logo-icon">⇄</span>
                    <span>LogiTrack</span>
                </div>

                <div id="loginAlert" class="alert alert-error"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" autocomplete="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>

                    <button type="submit" id="loginButton" class="btn btn-primary">Iniciar sesión</button>
                </form>
            </div>
        </div>

        <div class="auth-footer">
            &copy; <span id="footerYear"></span> LogiTrack — Desarrollado por
            <a href="https://github.com/jorgegmch" target="_blank" rel="noopener noreferrer">jorgegmch</a>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
